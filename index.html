<body>
    <div class="main-container">
        <header class="header">
            <h1 class="header-title">PORTAFOLIO</h1>
            <div class="name-banner">
                <h2>ARMANDO J. SILVAS</h2>
            </div>
            <nav class="nav-links">
                <a href="#marcas" class="nav-btn">MARCAS</a>
                <a href="#audiovisual" class="nav-btn">PRODUCCIÓN AUDIOVISUAL</a>
                <a href="#fotos" class="nav-btn">FOTOS</a>
            </nav>
        </header>

        <section class="yo-soy-section reveal">
            <div class="yo-soy-text">
                <h3>YO SOY</h3>
                <div class="description-card">
                    Un solucionador de problemas, me gusta contar historias a través de lo que hago...
                </div>
            </div>
            <div class="yo-soy-image"></div>
        </section>

        <section class="skills-section reveal">
            <div class="skills-image"></div>
            <div class="skills-content">
                <div class="icons-grid">
                    <div class="skill-tile">Ai</div>
                    <div class="skill-tile">Ps</div>
                    <div class="skill-tile">Ae</div>
                    <div class="skill-tile">Pr</div>
                    <div class="skill-tile">Id</div>
                    <div class="skill-tile">Fg</div>
                    <div class="skill-tile">C</div>
                    <div class="skill-tile">Be</div>
                </div>
                <h2 class="skills-title">TOOL SKILLS</h2>
            </div>
        </section>

        <footer class="footer reveal">
            </footer>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
